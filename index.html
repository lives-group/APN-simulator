<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>APN Sym</title>
</head>

<body>
    <h1>APN Symulator</h1>
    <input type="text" class="input" id="wordInput" placeholder="Entrada">
    <table id="wordTable">
        <tr id="wordIndex"><td>0</td><td>0</td><td>0</td></tr>
        <tr id="wordChar"><td>0</td><td>0</td><td>0</td></tr>
    </table>
    <div id="automata" class="panel"></div>
    <table id="stackTable">
        <tr>
            <td>&nbsp;</td>
        </tr>
    </table>
    <div class="panel" id="snaps"></div><br>
    <div class="control">
        <select id="layoutInput">
            <option value="grid">grid</option>
            <option value="circle">circle</option>
            <option value="cose">cose</option>
        </select>
        <input type="number" id="limitInput" value="1000">
        <select id="accInput">
            <option value="FS">FS</option>
            <option value="F">F</option>
            <option value="S">S</option>
        </select>
    </div>
    <div class="control">
        <button id="btReset"><i class="fa-solid fa-rotate"></i></button>
        <button id="btPrevious"><i class="fa-solid fa-backward-step"></i></button>
        <button id="btStart"><i class="fa-solid fa-play"></i></button>
        <button id="btNext"><i class="fa-solid fa-forward-step"></i></button>
    </div>
    <div class="control">
        <button id="btExercicio">Gramática</button>
        <button id="btDownload"><i class="fa-solid fa-floppy-disk"></i></button>
        <label for="btUpload" class="upload-btn">
            <i class="fa-solid fa-upload"></i>
        </label>
        <input type="file" id="btUpload" accept=".json" style="display: none;">

    </div>
    <div id="modal-root"></div>
    <a href="/oldindex.html" style="display: none;"><button>testes</button></a>
    <script src="cytoscape/cytoscape.min.js"></script>
    <script type="module" src="main.js"></script>
</body>

</html>
